# Puerto
server.port=${SERVER_PORT:8090}

# Configuración común de la base de datos
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mrp_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Cambiar validate a 'update' o 'create'
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}  
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

#Configuración del contexto de la aplicación
server.servlet.context-path=/api 

# Nombre de la aplicación
spring.application.name=backend-mrp

#Habilitar api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Definir la ruta de la documentación de la API
springdoc.swagger-ui.path=/docs

# Configuracion de la autenticacion JWT
jwt.secret=${JWT_SECRET:replace-with-a-long-random-secret}
jwt.expiration=${JWT_EXPIRATION:3600000}

# Superadmin credentials
superadmin.email=${SU_EMAIL:admin@gmail.com}
superadmin.password=${SU_PASSWORD:Admin@123}

