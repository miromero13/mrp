<main class="flex min-h-dvh items-center justify-center p-6">
  <section hlmCard class="w-full max-w-sm" aria-label="Vista de login">
    <div hlmCardHeader>
      <h1 hlmCardTitle>Login</h1>
      <p hlmCardDescription>Ingresa tus credenciales para acceder al dashboard.</p>
    </div>

    <div hlmCardContent>
      <form class="grid gap-4" [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="grid gap-2">
          <label hlmLabel for="email">Correo</label>
          <input hlmInput id="email" type="email" formControlName="email" placeholder="correo@ejemplo.com" />
          @if (emailControl.touched && emailControl.invalid) {
            <small class="text-sm text-destructive">Escribe un correo valido.</small>
          }
        </div>

        <div class="grid gap-2">
          <label hlmLabel for="password">Contrasena</label>
          <input hlmInput id="password" type="password" formControlName="password" placeholder="********" />
          @if (passwordControl.touched && passwordControl.invalid) {
            <small class="text-sm text-destructive">La contrasena es obligatoria.</small>
          }
        </div>

        @if (errorMessage()) {
          <p class="text-sm text-destructive">{{ errorMessage() }}</p>
        }

        <div hlmCardFooter class="px-0 pt-2">
          <button hlmBtn class="submit-btn" type="submit" [disabled]="loading()">
            {{ loading() ? 'Ingresando...' : 'Entrar' }}
          </button>
        </div>
      </form>
    </div>
  </section>
</main>
