<div class="flex flex-col gap-6">
  <header class="flex flex-wrap items-center justify-between gap-4 border-b pb-6">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Gestión de Costos Indirectos</h1>
      <p class="text-muted-foreground">Monitorea y registra los gastos operativos como servicios básicos y mantenimiento.</p>
    </div>
    <div class="flex items-center gap-2">
      <button hlmBtn variant="outline" size="sm" (click)="loadCosts()" [disabled]="loading()">
        <ng-icon hlm name="lucideRefreshCcw" size="sm" class="mr-2" [class.animate-spin]="loading()" />
        Actualizar
      </button>
      <button hlmBtn size="sm" (click)="openCreateDialog()">
        <ng-icon hlm name="lucidePlus" size="sm" class="mr-2" />
        Registrar Costo
      </button>
    </div>
  </header>

  @if (errorMessage()) {
    <div class="rounded-lg border border-destructive/50 bg-destructive/5 p-4 text-destructive">
      <p class="text-sm font-medium">{{ errorMessage() }}</p>
    </div>
  }

  <section class="rounded-xl border bg-card text-card-foreground shadow-sm overflow-hidden">
    <app-custom-table
      [columns]="tableColumns()"
      [rows]="costs()"
      [loading]="loading()"
      emptyMessage="No se encontraron costos indirectos registrados."
      (edit)="editCost($event)"
      (delete)="deleteCost($event.id)"
    />
  </section>

  @if (isModalOpen()) {
    <div class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto bg-background/80 px-4 py-6 backdrop-blur-sm">
      <div class="relative flex w-full max-w-2xl max-h-[90vh] flex-col overflow-hidden rounded-2xl border bg-card shadow-2xl">
        <div class="flex items-start justify-between gap-4 border-b px-6 py-4">
          <div>
            <h2 class="text-lg font-semibold">{{ selectedCost() ? 'Editar Costo' : 'Registrar Costo' }}</h2>
            <p class="pt-1 text-sm text-muted-foreground">Completa la información del costo operativo.</p>
          </div>
          <button hlmBtn variant="ghost" size="icon-sm" type="button" (click)="closeDialog()" [disabled]="saving()">
            <ng-icon hlm name="lucideX" size="sm" />
          </button>
        </div>
        <div class="p-6 overflow-y-auto">
          <app-indirect-cost-form
            [initialData]="selectedCost()"
            [loading]="saving()"
            [serverError]="formError()"
            (cancelled)="closeDialog()"
            (submitted)="saveCost($event)"
          />
        </div>
      </div>
    </div>
  }
</div>
