<main class="grid gap-4">
  <section class="rounded-xl border bg-card p-8 text-card-foreground shadow-xs">
    <div class="flex items-center justify-between gap-2">
      <div>
        <h1 class="text-xl font-semibold">Usuarios</h1>
        <p class="pt-1 text-sm text-muted-foreground">Listado de usuarios del sistema.</p>
      </div>
    </div>

    @if (errorMessage()) {
      <p class="mt-3 rounded-md border border-destructive/40 bg-destructive/5 px-3 py-2 text-sm text-destructive">
        {{ errorMessage() }}
      </p>
    }

    <div class="mt-4">
      <app-custom-table
        [columns]="tableColumns()"
        [rows]="users()"
        [loading]="loading()"
        [pageSize]="25"
        [skeletonRows]="10"
        [emptyMessage]="'No hay usuarios registrados.'"
      />
    </div>
  </section>
</main>
