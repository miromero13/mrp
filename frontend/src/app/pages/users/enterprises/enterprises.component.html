<main class="grid gap-4">
  <section class="rounded-xl border bg-card p-8 text-card-foreground shadow-xs">
    <div class="flex items-center justify-between gap-2">
      <div>
        <h1 class="text-xl font-semibold">Empresas</h1>
        <p class="pt-1 text-sm text-muted-foreground">Listado de empresas del sistema y su administrador principal.</p>
      </div>

      @if (canCreateEnterprise()) {
        <button hlmBtn type="button" class="gap-2" (click)="openCreateModal()">
          <ng-icon hlm [name]="'lucidePlus'" size="sm" />
          <span>Crear empresa</span>
        </button>
      }
    </div>

    @if (errorMessage()) {
      <p class="mt-3 rounded-md border border-destructive/40 bg-destructive/5 px-3 py-2 text-sm text-destructive">
        {{ errorMessage() }}
      </p>
    }

    <div class="mt-4">
      <app-custom-table
        [columns]="tableColumns()"
        [rows]="enterprises()"
        [loading]="loading()"
        [pageSize]="25"
        [skeletonRows]="10"
        [emptyMessage]="'No hay empresas registradas.'"
      />
    </div>
  </section>

  @if (isCreateModalOpen()) {
    <div class="fixed inset-0 z-50 flex items-start justify-center overflow-y-auto bg-background/80 px-4 py-6 backdrop-blur-sm">
      <div class="relative flex w-full max-w-4xl max-h-[90vh] flex-col overflow-hidden rounded-2xl border bg-card shadow-2xl">
        <div class="flex items-start justify-between gap-4 border-b px-6 py-4">
          <div>
            <h2 class="text-lg font-semibold">Crear empresa</h2>
            <p class="pt-1 text-sm text-muted-foreground">Completa los datos de la empresa y su admin principal.</p>
          </div>

          <button hlmBtn variant="ghost" size="icon-sm" type="button" (click)="closeCreateModal()" [disabled]="saving()">
            <ng-icon hlm [name]="'lucideX'" size="sm" />
          </button>
        </div>

        <div class="min-h-0 flex-1 overflow-y-auto p-6">
          <app-enterprise-form
            [loading]="saving()"
            [serverError]="createErrorMessage()"
            [submitLabel]="'Crear Empresa'"
            (cancelled)="closeCreateModal()"
            (submitted)="createEnterprise($event)"
          />
        </div>
      </div>
    </div>
  }
</main>
